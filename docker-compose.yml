version: "3.9"

# Local development setup for multi-worker testing with Redis pub/sub.
# Usage:
#   docker compose up --build
#   docker compose up --build --scale app=3  # 3 workers behind nginx
#
# Access the app at http://localhost:8080 (via nginx load balancer)
# or directly at http://localhost:8000 (single worker, no Redis needed)

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
